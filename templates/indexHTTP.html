<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<style>
    .boton {
        font-size: 18px;
        padding: 10px;
        margin: 5px 0;
        cursor: pointer;
        background-color: #008CBA;
        color: white;
        border: none;
        border-radius: 5px;
        width: 100%;
        transition: background-color 0.3s;
    }

    .boton-verde { background-color: #4CAF50; }
    .boton-amarillo { background-color: #FFD700; }

    .direction {
        display: grid;
        grid-template-rows: 100px 100px 100px;
        grid-template-columns: 100px 100px 100px;
        text-align: center;
        width:80%;
        margin: 20px auto;
    }

    .box {
        background: #444;
        border: 1px solid #555;
        display: flex;
        align-items: center;
        justify-content: center;
        color: yellowgreen;
        font-size: 18px;
        margin: 5px;
        cursor: pointer;
    }
</style>

<body>
    <div class="container mt-3">

        <!-- Botón Conectar -->
        <button id="botonConectar" class="boton" onclick="conectarDron()">Conectar con Dron</button>

        <!-- Control de Voz -->
        <div style="margin-top: 15px; padding: 15px; background-color: #333; border-radius: 5px; text-align: center;">
            <button id="botonVoz" class="boton" style="background-color: #FF6B6B;" onclick="toggleVoiceControl()">🎤 Activar Control de Voz</button>

            <p id="voiceStatus" style="color: #FFD700; font-size: 16px; margin-top: 10px; min-height: 20px;"></p>

            <!-- Visualizador de transcripción -->
            <div style="background-color: #222; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #555;">
                <span style="color: #aaa; font-size: 12px; display:block;">Escuchando:</span>
                <span id="voiceTranscript" style="color: white; font-size: 18px; font-weight: bold; font-style: italic;">...</span>
            </div>

            <p id="voiceCommand" style="color: #4CAF50; font-size: 14px; margin-top: 5px; min-height: 20px; font-weight: bold;"></p>
        </div>

        <!-- Altura + despegar -->
        <input type="number" id="altura" class="form-control mb-2" placeholder="Altura en metros">
        <button id="botonDespegar" class="boton" onclick="despegarDron()">Despegar</button>

        <!-- Botón Aterrizar -->
        <button id="botonAterrizar" class="boton" onclick="aterrizarDron()">Aterrizar Dron</button>

        <!-- Botón RTL -->
        <button id="botonRTL" class="boton" onclick="rtlDron()">RTL</button>

        <!-- Botones de dirección -->
        <div class="direction">
            <div onclick="moverDron('NorthWest')" class="box">NW</div>
            <div onclick="moverDron('North')" class="box">N</div>
            <div onclick="moverDron('NorthEast')" class="box">NE</div>
            <div onclick="moverDron('West')" class="box">W</div>
            <div onclick="moverDron('Stop')" class="box">Stop</div>
            <div onclick="moverDron('East')" class="box">E</div>
            <div onclick="moverDron('SouthWest')" class="box">SW</div>
            <div onclick="moverDron('South')" class="box">S</div>
            <div onclick="moverDron('SouthEast')" class="box">SE</div>
        </div>

        <!-- Altitud -->
        <div id="telemetriaDiv" style="font-size: 24px; text-align: center; width:100%; margin-top: 20px;">
            <p><strong>Estado:</strong> <span id="estadoValor">disconnected</span></p>
            <p><strong>Altitud:</strong> <span id="altitudValor">0</span> m</p>
            <p><strong>Heading:</strong> <span id="headingValor">0</span>°</p>
            <p><strong>Velocidad:</strong> <span id="speedValor">0</span> m/s</p>
        </div>

        <!-- Control de velocidad de navegación -->
        <div style="margin-top:15px; text-align:center;">
            <label for="navSpeed" style="font-size:18px;"><strong>Vel. navegación (m/s):</strong></label>
            <input type="range" id="navSpeed" min="0" max="20" step="1" value="1" style="width:70%;">
            <span id="navSpeedLabel">1</span>
        </div>

        <!-- Control de heading -->
        <div style="margin-top:10px; text-align:center;">
            <label for="headingCtrl" style="font-size:18px;"><strong>Heading (°):</strong></label>
            <input type="range" id="headingCtrl" min="0" max="360" step="5" value="0" style="width:70%;">
            <span id="headingCtrlLabel">0</span>
        </div>

    </div>

<script>

// ------------------------------------
// RECONOCIMIENTO DE VOZ
// ------------------------------------

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let voiceControlActive = false;
let isStopping = false; // Flag para evitar bucle infinito

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = "es-ES";  // Español

    recognition.onstart = () => {
        updateVoiceStatus("🎤 Escuchando...");
        document.getElementById("botonVoz").style.backgroundColor = "#4CAF50";
        isStopping = false;
    };

    recognition.onend = () => {
        if (voiceControlActive && !isStopping) {
            updateVoiceStatus("⚠️ Se detuvo. Reiniciando...");
            setTimeout(() => {
                if (voiceControlActive) recognition.start();
            }, 500);
        }
    };

    recognition.onresult = (event) => {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }

        transcript = transcript.toLowerCase().trim();

        // Actualizar visualizador
        const tObj = document.getElementById("voiceTranscript");
        if(tObj) tObj.innerText = transcript;

        if (event.results[event.results.length - 1].isFinal) {
            updateVoiceStatus("✅ Procesando...");
            processVoiceCommand(transcript);
        } else {
            updateVoiceStatus("🎤 Escuchando...");
        }
    };

    recognition.onerror = (event) => {
        updateVoiceStatus(`❌ Error: ${event.error}`);
    };
}

function toggleVoiceControl() {
    if (!recognition) {
        alert("Tu navegador no soporta reconocimiento de voz");
        return;
    }

    voiceControlActive = !voiceControlActive;

    if (voiceControlActive) {
        isStopping = false;
        recognition.start();
        updateVoiceStatus("🎤 Escuchando...");
        document.getElementById("botonVoz").textContent = "🎤 Detener Voz";
    } else {
        isStopping = true;
        recognition.stop();
        updateVoiceStatus("🛑 Detenido");
        updateVoiceCommand("");
        document.getElementById("voiceTranscript").innerText = "...";
        document.getElementById("botonVoz").textContent = "🎤 Activar Control de Voz";
        document.getElementById("botonVoz").style.backgroundColor = "#FF6B6B";
    }
}

function updateVoiceStatus(message) {
    document.getElementById("voiceStatus").innerText = message;
}

function updateVoiceCommand(message) {
    document.getElementById("voiceCommand").innerText = message;
}

function processVoiceCommand(transcript) {
    console.log("Procesando comando de voz:", transcript);

    // Mapeo de comandos en español a funciones
    const comandos = {
        // Despegar
        "despega": () => {
            const altura = document.getElementById('altura').value || "10";
            despegarDron();
            updateVoiceCommand(`✈️ Despegando a ${altura}m`);
        },
        "despegar": () => {
            const altura = document.getElementById('altura').value || "10";
            despegarDron();
            updateVoiceCommand(`✈️ Despegando a ${altura}m`);
        },

        // Aterrizar
        "aterriza": () => {
            aterrizarDron();
            updateVoiceCommand("🛬 Aterrizando...");
        },
        "aterrizar": () => {
            aterrizarDron();
            updateVoiceCommand("🛬 Aterrizando...");
        },
        "tierra": () => {
            aterrizarDron();
            updateVoiceCommand("🛬 Aterrizando...");
        },

        // RTL (Regresar a casa)
        "regresa": () => {
            rtlDron();
            updateVoiceCommand("🏠 Regresando a casa...");
        },
        "vuelve": () => {
            rtlDron();
            updateVoiceCommand("🏠 Regresando a casa...");
        },
        "rtl": () => {
            rtlDron();
            updateVoiceCommand("🏠 RTL activado...");
        },

        // Movimientos - Norte
        "norte": () => {
            moverDron("North");
            updateVoiceCommand("⬆️ Volando hacia el Norte");
        },
        "adelante": () => {
            moverDron("North");
            updateVoiceCommand("⬆️ Volando hacia adelante");
        },
        "arriba": () => {
            moverDron("North");
            updateVoiceCommand("⬆️ Volando hacia arriba");
        },

        // Movimientos - Sur
        "sur": () => {
            moverDron("South");
            updateVoiceCommand("⬇️ Volando hacia el Sur");
        },
        "atrás": () => {
            moverDron("South");
            updateVoiceCommand("⬇️ Volando hacia atrás");
        },
        "atras": () => {
            moverDron("South");
            updateVoiceCommand("⬇️ Volando hacia atrás");
        },

        // Movimientos - Este
        "este": () => {
            moverDron("East");
            updateVoiceCommand("➡️ Volando hacia el Este");
        },
        "derecha": () => {
            moverDron("East");
            updateVoiceCommand("➡️ Volando hacia la derecha");
        },

        // Movimientos - Oeste
        "oeste": () => {
            moverDron("West");
            updateVoiceCommand("⬅️ Volando hacia el Oeste");
        },
        "izquierda": () => {
            moverDron("West");
            updateVoiceCommand("⬅️ Volando hacia la izquierda");
        },

        // Detener
        "para": () => {
            moverDron("Stop");
            updateVoiceCommand("⏹️ Deteniendo...");
        },
        "parar": () => {
            moverDron("Stop");
            updateVoiceCommand("⏹️ Deteniendo...");
        },
        "detente": () => {
            moverDron("Stop");
            updateVoiceCommand("⏹️ Deteniendo...");
        },
        "stop": () => {
            moverDron("Stop");
            updateVoiceCommand("⏹️ Stop!");
        },
    };

    // Buscar coincidencias en el transcript
    for (const [palabra, accion] of Object.entries(comandos)) {
        if (transcript.includes(palabra)) {
            accion();
            return;
        }
    }

    updateVoiceCommand("❓ Comando no reconocido");
}



function post(url, body = {}) {
    return fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });
}

// Helper: quitar verde y amarillo, volver al azul original
function resetBtn(id) {
    const btn = document.getElementById(id);
    btn.classList.remove('boton-verde', 'boton-amarillo');
}

function setBtn(id, color) {
    const btn = document.getElementById(id);
    btn.classList.remove('boton-verde', 'boton-amarillo');
    btn.classList.add(color);
}

function conectarDron() {
    setBtn('botonConectar', 'boton-amarillo');
    post("/connect");
}

function despegarDron() {
    const altura = document.getElementById('altura').value;
    if (!altura) {
        alert("Ingresa una altura válida");
        return;
    }
    setBtn('botonDespegar', 'boton-amarillo');
    post("/takeoff", { altura });
}

function aterrizarDron() {
    setBtn('botonAterrizar', 'boton-amarillo');
    post("/land");
}

function rtlDron() {
    setBtn('botonRTL', 'boton-amarillo');
    post("/rtl");
}

function moverDron(dir) {
    post("/move", { direction: dir });
}

// ------------------------------------
// CONTROL DE VELOCIDAD Y HEADING
// ------------------------------------

document.getElementById("navSpeed").addEventListener("input", function() {
    document.getElementById("navSpeedLabel").innerText = this.value;
});
document.getElementById("navSpeed").addEventListener("change", function() {
    post("/changeNavSpeed", { speed: parseFloat(this.value) });
});

document.getElementById("headingCtrl").addEventListener("input", function() {
    document.getElementById("headingCtrlLabel").innerText = this.value;
});
document.getElementById("headingCtrl").addEventListener("change", function() {
    post("/changeHeading", { heading: parseInt(this.value) });
});

// ------------------------------------
// TELEMETRÍA (Polling cada 500ms)
// Los botones SOLO cambian a verde cuando
// se detecta una transición de estado real.
// ------------------------------------

let prevEstado = "disconnected";

setInterval(() => {
    fetch("/telemetry")
        .then(r => r.json())
        .then(data => {
            document.getElementById("altitudValor").innerText = data.alt.toFixed(2);
            document.getElementById("estadoValor").innerText = data.state;
            document.getElementById("headingValor").innerText = Math.round(data.heading || 0);
            document.getElementById("speedValor").innerText = (data.groundSpeed || 0).toFixed(1);

            const estado = data.state;

            // Solo actuar en transiciones reales (estado cambió)
            if (estado !== prevEstado) {

                // disconnected → connected: conexión completada
                if (prevEstado === "disconnected" && estado === "connected") {
                    setBtn('botonConectar', 'boton-verde');
                }

                // armed/takingOff → flying: despegue completado
                if (estado === "flying" && (prevEstado === "takingOff" || prevEstado === "armed")) {
                    setBtn('botonDespegar', 'boton-verde');
                }

                // landing → connected: aterrizaje completado
                if (estado === "connected" && prevEstado === "landing") {
                    setBtn('botonAterrizar', 'boton-verde');
                }

                // returning → connected: RTL completado
                if (estado === "connected" && prevEstado === "returning") {
                    setBtn('botonRTL', 'boton-verde');
                }

                prevEstado = estado;
            }
        })
        .catch(() => {});
}, 500);

</script>

</body>
</html>
