<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebApp Dron V2</title>

    <!-- Scripts y Estilos -->
    <script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Leaflet para Mapas -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .boton {
            font-size: 18px;
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 5px;
            width: 100%;
            transition: background-color 0.3s;
        }
        .boton-verde { background-color: #4CAF50 !important; }
        .boton-amarillo { background-color: #FFD700 !important; color: black !important; }

        /* Controles de Dirección */
        .direction {
            display: grid;
            grid-template-rows: 80px 80px 80px;
            grid-template-columns: 80px 80px 80px;
            text-align: center;
            width: 240px;
            margin: 20px auto;
        }
        .box {
            background: #444;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            color: yellowgreen;
            font-size: 14px;
            margin: 2px;
            cursor: pointer;
            user-select: none;
        }
        .box:active { background: #666; }

        /* Mapa */
        #map { height: 500px; width: 100%; margin-top: 10px; }

        /* Video */
        #video-container { width: 100%; max-width: 640px; margin: 0 auto; background: #000; }
        video { width: 100%; height: auto; display: block; }
    </style>
</head>

<body>
    <div class="container mt-3">
        <h2 class="text-center mb-3">Control de Dron - Versión 2</h2>

        <!-- Navegación por Pestañas -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="control-tab" data-bs-toggle="tab" data-bs-target="#control" type="button" role="tab" aria-controls="control" aria-selected="true">🕹 Control</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="mapa-tab" data-bs-toggle="tab" data-bs-target="#mapa" type="button" role="tab" aria-controls="mapa" aria-selected="false">🗺 Mapa</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="video-tab" data-bs-toggle="tab" data-bs-target="#video" type="button" role="tab" aria-controls="video" aria-selected="false">📷 Video</button>
            </li>
        </ul>

        <!-- Contenido de Pestañas -->
        <div class="tab-content" id="myTabContent">

            <!-- PESTAÑA 1: CONTROL (Botones) -->
            <div class="tab-pane fade show active p-3" id="control" role="tabpanel" aria-labelledby="control-tab">

                <button id="botonConectar" class="boton" onclick="conectarDron()">Conectar con Dron</button>

                <div class="row">
                    <div class="col-8">
                        <input type="number" id="altura" class="form-control" placeholder="Altura (m)">
                    </div>
                    <div class="col-4">
                        <button id="botonDespegar" class="boton mt-0" onclick="despegarDron()">Despegar</button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-6">
                        <button id="botonAterrizar" class="boton" onclick="aterrizarDron()">Aterrizar</button>
                    </div>
                    <div class="col-6">
                        <button id="botonRTL" class="boton" onclick="rtlDron()">RTL</button>
                    </div>
                </div>

                <!-- Control de Voz -->
                <div style="margin-top: 15px; padding: 15px; background-color: #333; border-radius: 5px; text-align: center;">
                    <button id="botonVoz" class="boton" style="background-color: #FF6B6B;" onclick="toggleVoiceControl()">🎤 Activar Control de Voz</button>
                    <p id="voiceStatus" style="color: #FFD700; font-size: 14px; margin-top: 10px; min-height: 20px;"></p>
                    <p id="voiceCommand" style="color: #4CAF50; font-size: 12px; margin-top: 5px; min-height: 20px; font-weight: bold;"></p>
                </div>

                <!-- Botones Dirección -->
                <div class="direction">
                    <div onclick="moverDron('NorthWest')" class="box">NW</div>
                    <div onclick="moverDron('North')" class="box">N</div>
                    <div onclick="moverDron('NorthEast')" class="box">NE</div>
                    <div onclick="moverDron('West')" class="box">W</div>
                    <div onclick="moverDron('Stop')" class="box">Stop</div>
                    <div onclick="moverDron('East')" class="box">E</div>
                    <div onclick="moverDron('SouthWest')" class="box">SW</div>
                    <div onclick="moverDron('South')" class="box">S</div>
                    <div onclick="moverDron('SouthEast')" class="box">SE</div>
                </div>

                <!-- Velocidad de navegación -->
                <div class="mb-2 text-center">
                    <label><strong>Velocidad:</strong> <span id="navSpeedValue">1</span> m/s</label>
                    <input type="range" id="navSpeedSlider" class="form-range" min="0" max="20" value="1" step="1"
                        oninput="document.getElementById('navSpeedValue').innerText = this.value; resetBtn('botonNavSpeed');">
                    <button id="botonNavSpeed" class="boton mt-1 w-50" onclick="cambiarVelocidad()">Aplicar Velocidad</button>
                </div>

                <!-- Heading -->
                <div class="mb-2 text-center">
                    <label><strong>Heading:</strong> <span id="headingValue">0</span>°</label>
                    <input type="range" id="headingSlider" class="form-range" min="0" max="360" value="0" step="1"
                        oninput="document.getElementById('headingValue').innerText = this.value"
                        onpointerdown="arrastrando = true"
                        onpointerup="soltarSlider()"
                        ontouchend="soltarSlider()">
                    <button id="botonHeading" class="boton mt-1 w-50" onclick="cambiarHeading()">Aplicar Giro</button>
                </div>

                <!-- Telemetría Simple -->
                <div class="alert alert-info text-center mt-3">
                    <strong>Altitud:</strong> <span id="altitudValor">0</span> m |
                    <strong>Velocidad:</strong> <span id="speedValor">0</span> m/s |
                    <strong>Estado:</strong> <span id="estadoValor">--</span>
                </div>
            </div>

            <!-- PESTAÑA 2: MAPA -->
            <div class="tab-pane fade p-3" id="mapa" role="tabpanel" aria-labelledby="mapa-tab">
                <div id="telemetriaMapa" class="mb-2">
                    Posición actual: <span id="latLonMap">Esperando datos...</span>
                </div>
                <div id="map"></div>
                <button class="btn btn-secondary mt-2 btn-sm" onclick="centrarMapa()">Centrar Mapa</button>
            </div>

            <!-- PESTAÑA 3: VIDEO -->
            <div class="tab-pane fade p-3 text-center" id="video" role="tabpanel" aria-labelledby="video-tab">
                <h3>Video Streaming (WebRTC)</h3>
                <div id="video-container">
                    <video id="remoteVideo" autoplay playsinline controls></video>
                </div>
                <button id="btnStartVideo" class="boton mt-3 w-50" onclick="startVideo()">Iniciar Video</button>
                <p class="text-muted mt-2 small">Asegurar que CameraService.py está corriendo en el puerto 8080.</p>
            </div>
        </div>

    </div>

    <!-- LÓGICA DE LA APLICACIÓN -->
    <script>
        // ================= MQTT CONFIG =================
        // Configuración para el broker de la UPC (asegurar que coincida con lo solicitado)
        const MQTT_BROKER = 'ws://dronseetac.upc.edu:8000/mqtt';
        const MQTT_USER = 'dronsEETAC';
        const MQTT_PASS = 'mimara1456.';

        const client = mqtt.connect(MQTT_BROKER, {
            username: MQTT_USER,
            password: MQTT_PASS,
            clean: false,
            clientId: 'webapp_v2_' + Math.random().toString(16).substr(2, 8),
            reconnectPeriod: 2000,
        });

        // Variables de estado
        let arrastrando = false;
        let timerSoltar = null;

        // Mapa
        let map;
        let droneMarker;
        let dronePath;
        let pathCoords = [];
        let mapInitialized = false;

        // ================= RECONOCIMIENTO DE VOZ =================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let voiceControlActive = false;
        let isStopping = false;
        let isListening = false;
        let voiceRestartTimer = null;
        let lastVoiceError = "";

        const NON_RETRIABLE_VOICE_ERRORS = new Set([
            "not-allowed",
            "service-not-allowed",
            "audio-capture"
        ]);

        function clearVoiceRestartTimer() {
            if (voiceRestartTimer) {
                clearTimeout(voiceRestartTimer);
                voiceRestartTimer = null;
            }
        }

        function safeStartRecognition() {
            if (!recognition || !voiceControlActive || isStopping || isListening) return;

            try {
                recognition.start();
            } catch (err) {
                // Evita romper la UX por carreras de estado de la API.
                if (!err || err.name !== "InvalidStateError") {
                    console.error("Error iniciando reconocimiento:", err);
                }
            }
        }

        function safeStopRecognition() {
            if (!recognition) return;
            clearVoiceRestartTimer();
            isStopping = true;

            if (isListening) {
                try {
                    recognition.stop();
                } catch (err) {
                    console.warn("Error deteniendo reconocimiento:", err);
                }
            }
        }

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = "es-ES";

            recognition.onstart = () => {
                isListening = true;
                lastVoiceError = "";
                updateVoiceStatus("🎤 Escuchando...");
                document.getElementById("botonVoz").style.backgroundColor = "#4CAF50";
            };

            recognition.onend = () => {
                isListening = false;

                if (isStopping || !voiceControlActive) {
                    isStopping = false;
                    return;
                }

                if (NON_RETRIABLE_VOICE_ERRORS.has(lastVoiceError)) {
                    updateVoiceStatus("❌ Permiso o micrófono no disponible");
                    return;
                }

                clearVoiceRestartTimer();
                voiceRestartTimer = setTimeout(() => {
                    if (voiceControlActive && !isStopping && !isListening) {
                        safeStartRecognition();
                    }
                }, 900);

                if (voiceControlActive) {
                    updateVoiceStatus("⚠️ Se detuvo. Reiniciando...");
                }
            };

            recognition.onresult = (event) => {
                let transcript = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                transcript = transcript.toLowerCase().trim();

                if (event.results[event.results.length - 1].isFinal) {
                    updateVoiceCommand(`Comando detectado: "${transcript}"`);
                    processVoiceCommand(transcript);
                } else {
                    updateVoiceStatus(`Escuchando: "${transcript}"`);
                }
            };

            recognition.onerror = (event) => {
                lastVoiceError = event.error || "unknown";

                if (NON_RETRIABLE_VOICE_ERRORS.has(lastVoiceError)) {
                    voiceControlActive = false;
                    isStopping = true;
                    clearVoiceRestartTimer();
                    updateVoiceStatus(`❌ Error de voz: ${lastVoiceError}`);
                    document.getElementById("botonVoz").textContent = "🎤 Activar Control de Voz";
                    document.getElementById("botonVoz").style.backgroundColor = "#FF6B6B";
                    return;
                }

                // no-speech/aborted/network: recuperables, onend hará el restart.
                updateVoiceStatus(`⚠️ Error temporal: ${lastVoiceError}`);
            };
        }

        function toggleVoiceControl() {
            if (!recognition) {
                alert("Tu navegador no soporta reconocimiento de voz");
                return;
            }

            if (!voiceControlActive) {
                voiceControlActive = true;
                isStopping = false;
                lastVoiceError = "";
                clearVoiceRestartTimer();
                safeStartRecognition();
                updateVoiceStatus("🎤 Escuchando...");
                document.getElementById("botonVoz").textContent = "🎤 Detener Voz";
            } else {
                voiceControlActive = false;
                safeStopRecognition();
                updateVoiceStatus("");
                updateVoiceCommand("");
                document.getElementById("botonVoz").textContent = "🎤 Activar Control de Voz";
                document.getElementById("botonVoz").style.backgroundColor = "#FF6B6B";
            }
        }

        function updateVoiceStatus(message) {
            document.getElementById("voiceStatus").innerText = message;
        }

        function updateVoiceCommand(message) {
            document.getElementById("voiceCommand").innerText = message;
        }

        function processVoiceCommand(transcript) {
            const comandos = {
                "despega": () => { despegarDron(); updateVoiceCommand("✈️ Despegando"); },
                "despegar": () => { despegarDron(); updateVoiceCommand("✈️ Despegando"); },
                "aterriza": () => { aterrizarDron(); updateVoiceCommand("🛬 Aterrizando..."); },
                "aterrizar": () => { aterrizarDron(); updateVoiceCommand("🛬 Aterrizando..."); },
                "tierra": () => { aterrizarDron(); updateVoiceCommand("🛬 Aterrizando..."); },
                "regresa": () => { rtlDron(); updateVoiceCommand("🏠 Regresando a casa..."); },
                "vuelve": () => { rtlDron(); updateVoiceCommand("🏠 Regresando a casa..."); },
                "rtl": () => { rtlDron(); updateVoiceCommand("🏠 RTL activado..."); },
                "norte": () => { moverDron("North"); updateVoiceCommand("⬆️ Volando hacia el Norte"); },
                "adelante": () => { moverDron("North"); updateVoiceCommand("⬆️ Volando hacia adelante"); },
                "arriba": () => { moverDron("North"); updateVoiceCommand("⬆️ Volando hacia arriba"); },
                "sur": () => { moverDron("South"); updateVoiceCommand("⬇️ Volando hacia el Sur"); },
                "atrás": () => { moverDron("South"); updateVoiceCommand("⬇️ Volando hacia atrás"); },
                "atras": () => { moverDron("South"); updateVoiceCommand("⬇️ Volando hacia atrás"); },
                "este": () => { moverDron("East"); updateVoiceCommand("➡️ Volando hacia el Este"); },
                "derecha": () => { moverDron("East"); updateVoiceCommand("➡️ Volando hacia la derecha"); },
                "oeste": () => { moverDron("West"); updateVoiceCommand("⬅️ Volando hacia el Oeste"); },
                "izquierda": () => { moverDron("West"); updateVoiceCommand("⬅️ Volando hacia la izquierda"); },
                "para": () => { moverDron("Stop"); updateVoiceCommand("⏹️ Deteniendo..."); },
                "parar": () => { moverDron("Stop"); updateVoiceCommand("⏹️ Deteniendo..."); },
                "detente": () => { moverDron("Stop"); updateVoiceCommand("⏹️ Deteniendo..."); },
                "stop": () => { moverDron("Stop"); updateVoiceCommand("⏹️ Stop!"); },
            };

            for (const [palabra, accion] of Object.entries(comandos)) {
                if (transcript.includes(palabra)) {
                    accion();
                    return;
                }
            }

            updateVoiceCommand("❓ Comando no reconocido");
        }

        // ================= MQTT LÓGICA =================

        client.on('connect', function () {
            console.log('Conectado al broker MQTT');
            client.subscribe('autopilotServiceDemo/mobileFlask/#');
            initMap(); // Inicializar mapa al conectar (o al cargar página)
        });

        client.on('message', function (topic, message) {
            if (topic.includes("telemetryInfo")) {
                try {
                    const data = JSON.parse(message.toString());
                    actualizarTelemetria(data);
                    actualizarMapa(data);
                } catch (e) {
                    console.error("Error parseando JSON:", e);
                }
            }
        });

        function actualizarTelemetria(data) {
            document.getElementById("altitudValor").innerText = (data.alt || 0).toFixed(2);
            document.getElementById("speedValor").innerText = (data.groundSpeed || 0).toFixed(1);
            document.getElementById("estadoValor").innerText = data.state || 'Desconocido';

            // Actualizar botones según estado
            const st = data.state;
            if (st === "flying") setBtnSuccess('botonDespegar');
            if (st === "landed") setBtnSuccess('botonAterrizar');
            if (st === "rtl" || st === "atHome") setBtnSuccess('botonRTL');
            if (st === "connected") setBtnSuccess('botonConectar');

            // Actualizar slider heading si no se está usando
            if (data.heading !== undefined && !arrastrando) {
                document.getElementById('headingSlider').value = Math.round(data.heading);
                document.getElementById('headingValue').innerText = Math.round(data.heading);
                resetBtn('botonHeading');
            }
        }

        // ================= MAPA (LEAFLET) =================

        function initMap() {
            if (mapInitialized) return;
            // Coordenadas iniciales por defecto (Castelldefels EETAC)
            const latIni = 41.275;
            const lonIni = 1.987;

            map = L.map('map').setView([latIni, lonIni], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Icono del dron (puedes personalizarlo)
            var droneIcon = L.icon({
                iconUrl: 'https://upload.wikimedia.org/wikipedia/commons/d/d1/Google_Maps_pin.svg', // Placeholder pin
                iconSize: [30, 30],
                iconAnchor: [15, 30]
            });

            droneMarker = L.marker([latIni, lonIni], {icon: droneIcon}).addTo(map);
            dronePath = L.polyline([], {color: 'red'}).addTo(map);

            // Corrige problema de renderizado de Leaflet en pestañas ocultas
            // Al cambiar a la pestaña mapa, invalidar tamaño
            document.getElementById('mapa-tab').addEventListener('shown.bs.tab', function (e) {
                map.invalidateSize();
            });

            mapInitialized = true;
        }

        function actualizarMapa(data) {
            if (!mapInitialized || !data.lat || !data.lon) return;

            const lat = data.lat;
            const lon = data.lon;

            // Algunos simuladores envían 0,0 al inicio, ignorar
            if (Math.abs(lat) < 0.1 && Math.abs(lon) < 0.1) return;

            const newLatLng = [lat, lon];

            droneMarker.setLatLng(newLatLng);
            pathCoords.push(newLatLng);
            dronePath.setLatLngs(pathCoords);

            document.getElementById('latLonMap').innerText = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;

            // Auto-centrar la primera vez que recibimos coord validas
            if (pathCoords.length === 1) {
                map.setView(newLatLng, 18);
            }
        }

        function centrarMapa() {
            if (droneMarker) {
                map.setView(droneMarker.getLatLng(), map.getZoom());
            }
        }

        // ================= VIDEO (WebRTC) =================
        // Se comunica con CameraService.py en puerto 8080 (servimos oferta SDP via HTTP POST)

        async function startVideo() {
            const videoEl = document.getElementById('remoteVideo');
            const btn = document.getElementById('btnStartVideo');

            btn.disabled = true;
            btn.innerText = "Conectando...";

            const pc = new RTCPeerConnection();

            // Configurar qué hacer cuando llegue el stream
            pc.ontrack = function(event) {
                if (videoEl.srcObject !== event.streams[0]) {
                    videoEl.srcObject = event.streams[0];
                    console.log('Stream de video recibido');
                }
            };

            // Solo necesitamos recibir video (addTransceiver recvonly)
            pc.addTransceiver('video', {direction: 'recvonly'});

            // Crear oferta WebRTC
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // Enviar oferta al servidor CameraService
            // IMPORTANTE: Asegúrate de que el puerto sea el correcto (8080 por defecto en nuestro script nuevo)
            try {
                const response = await fetch('http://localhost:8080/offer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sdp: pc.localDescription.sdp,
                        type: pc.localDescription.type
                    })
                });

                if (!response.ok) throw new Error("Error en respuesta del servidor");

                const answer = await response.json();
                await pc.setRemoteDescription(answer);

                btn.innerText = "Video Activo";
                btn.classList.add('boton-verde');

            } catch (e) {
                console.error(e);
                alert("No se pudo conectar al servicio de cámara.\nAsegúrate de ejecutar: python CameraService.py");
                btn.innerText = "Reintentar";
                btn.disabled = false;
                pc.close();
            }
        }


        // ================= FUNCIONES DE CONTROL =================

        function conectarDron() {
            mqttPublish('connect');
            mqttPublish('startTelemetry');
        }

        function despegarDron() {
            const h = document.getElementById('altura').value || 5;
            mqttPublish('arm_takeOff', h.toString());
            setBtnPending('botonDespegar');
        }

        function aterrizarDron() {
            mqttPublish('Land');
            setBtnPending('botonAterrizar');
        }

        function rtlDron() {
            mqttPublish('RTL');
            setBtnPending('botonRTL');
        }

        function moverDron(dir) {
            mqttPublish('go', dir);
        }

        function cambiarHeading() {
            const val = document.getElementById('headingSlider').value;
            mqttPublish('changeHeading', val.toString());
            setBtnPending('botonHeading');

            clearTimeout(timerSoltar);
            arrastrando = false; // Liberar slider tras enviar
        }

        function cambiarVelocidad() {
            const val = document.getElementById('navSpeedSlider').value;
            mqttPublish('changeNavSpeed', val.toString());
            setBtnPending('botonNavSpeed');
        }

        function soltarSlider() {
            clearTimeout(timerSoltar);
            timerSoltar = setTimeout(() => { arrastrando = false; }, 3000);
        }

        // Helpers de UI
        function setBtnSuccess(id) {
            const b = document.getElementById(id);
            if(b) {
                b.classList.remove('boton-amarillo');
                b.classList.add('boton-verde');
            }
        }
        function setBtnPending(id) {
            const b = document.getElementById(id);
            if(b) {
                b.classList.remove('boton-verde');
                b.classList.add('boton-amarillo');
            }
        }
        function resetBtn(id) {
            const b = document.getElementById(id);
            if(b) b.classList.remove('boton-verde', 'boton-amarillo');
        }

        function mqttPublish(cmd, payload = "") {
            // Topic destino: mobileFlask/autopilotServiceDemo/<comando>
            // Topic origen (respuesta): autopilotServiceDemo/mobileFlask/<evento>
            const topic = `mobileFlask/autopilotServiceDemo/${cmd}`;
            client.publish(topic, payload);
            console.log("CMD:", topic, payload);
        }

    </script>

</body>
</html>
